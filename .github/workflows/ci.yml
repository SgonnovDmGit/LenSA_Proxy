name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-modern:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.1
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        shell: pwsh
        run: |
          $unformatted = Get-ChildItem -Recurse -Filter *.go | ForEach-Object { gofmt -l $_.FullName }
          if ($unformatted) {
            $unformatted
            exit 1
          }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -timeout=60s ./...

      - name: Race test
        run: go test -race -timeout=120s ./...

      - name: Build modern amd64
        shell: pwsh
        run: .\scripts\build-modern.ps1 -Version 0.1.0 -OutputDirectory build\ci-modern

      - name: Upload modern artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: LenSA-Proxy-modern-amd64
          path: build/ci-modern/LenSA_Proxy_windows_amd64.exe
          if-no-files-found: error
          retention-days: 7

  build-legacy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up resource Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.1
          cache: true

      - name: Build legacy 386
        shell: pwsh
        run: .\scripts\build-legacy.ps1 -Version 0.1.0 -OutputDirectory build\ci-legacy

      - name: Upload legacy artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: LenSA-Proxy-legacy-386
          path: build/ci-legacy/LenSA_Proxy_windows_legacy_386.exe
          if-no-files-found: error
          retention-days: 7
