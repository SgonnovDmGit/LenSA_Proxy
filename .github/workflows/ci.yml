name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  verify-modern:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.1
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        shell: pwsh
        run: |
          $unformatted = Get-ChildItem -Recurse -Filter *.go | ForEach-Object { gofmt -l $_.FullName }
          if ($unformatted) {
            $unformatted
            exit 1
          }

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Race test
        run: go test -race ./...

      - name: Build modern amd64
        run: go build ./cmd/lensa-proxy

  compile-386:
    runs-on: windows-latest
    env:
      CGO_ENABLED: "0"
      GOARCH: "386"
      GOOS: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.1
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build Windows 386
        run: go build ./cmd/lensa-proxy
